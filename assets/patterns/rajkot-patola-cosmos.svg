<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3a86b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8fd1ff" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="cool" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fd1ff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#6dd9c2" stop-opacity="0.20"/>
    </linearGradient>
    <symbol id="diamond" viewBox="0 0 40 40">
      <path d="M20 2 L38 20 L20 38 L2 20 Z" fill="none" stroke="url(#warm)" stroke-width="1.2"/>
      <path d="M20 9 L31 20 L20 31 L9 20 Z" fill="none" stroke="url(#cool)" stroke-width="1"/>
    </symbol>
    <symbol id="star" viewBox="0 0 24 24">
      <path d="M12 2 L14.8 9.2 L22 12 L14.8 14.8 L12 22 L9.2 14.8 L2 12 L9.2 9.2 Z" fill="none" stroke="#8fd1ff" stroke-opacity="0.28" stroke-width="1"/>
    </symbol>
    <symbol id="ring" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="6" fill="none" stroke="#f3a86b" stroke-opacity="0.28" stroke-width="1"/>
      <ellipse cx="14" cy="14" rx="11" ry="4" fill="none" stroke="#8fd1ff" stroke-opacity="0.25" stroke-width="1"/>
    </symbol>
    <symbol id="swirl" viewBox="0 0 30 30">
      <path d="M15 5 C22 5 25 10 23 14 C21 18 15 18 13 15 C11 12 13 9 16 9 C19 9 20 11 20 12"
            fill="none" stroke="#6dd9c2" stroke-opacity="0.24" stroke-width="1.1" stroke-linecap="round"/>
      <circle cx="20" cy="12" r="1" fill="#6dd9c2" fill-opacity="0.28"/>
    </symbol>
    <pattern id="tile" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="none"/>
      <path d="M0 40 H80 M40 0 V80" stroke="#8fd1ff" stroke-opacity="0.07" stroke-width="1"/>
      <use href="#diamond" x="20" y="20" width="40" height="40"/>
      <use href="#star" x="4" y="4" width="12" height="12"/>
      <use href="#ring" x="54" y="2" width="20" height="20"/>
      <use href="#swirl" x="2" y="50" width="20" height="20"/>
    </pattern>
  </defs>

  <rect width="320" height="320" fill="url(#tile)"/>

  <g opacity="0.24">
    <path d="M0 0 L320 320" stroke="#f3a86b" stroke-opacity="0.16"/>
    <path d="M320 0 L0 320" stroke="#8fd1ff" stroke-opacity="0.16"/>
  </g>
</svg>
